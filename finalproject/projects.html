<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Gallery - REMIS</title>
    <meta name="description"
        content="View the gallery of projects successfully completed by REMIS including construction, installation, and maintenance.">
    <meta name="author" content="Brandon">

    <meta property="og:title" content="REMIS Project Gallery">
    <meta property="og:description" content="Explore our portfolio of top-tier industrial solutions.">
    <meta property="og:image" content="https://images.unsplash.com/photo-1542152648-52e6ff56f4d0?w=1200">
    <meta property="og:type" content="website">

    <link rel="icon" href="images/favicon.webp" type="image/webp">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles/normalize.css">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/main-larger.css">

    <!-- External Scripts -->
    <script type="module" src="scripts/main.mjs"></script>
    <script type="module" src="scripts/storage.mjs"></script>
    <script type="module" src="scripts/projects.mjs"></script>
    <script src="scripts/dates.js" defer></script>
</head>

<body>
    <header>
        <div class="logo-container">
            <a href="index.html">
                <img src="images/logo-remis-v1-small.webp" alt="REMIS Logo" class="logo-img" width="188" height="58">
            </a>
        </div>
        <button id="menuButton" aria-label="Toggle Navigation">☰</button>
        <nav id="navMenu">
            <a href="index.html">Home</a>
            <a href="projects.html">Gallery</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <main>
        <h1>Our Previous Projects</h1>
        <p>Explore our wide range of successful industrial interventions. Use the buttons below to filter by project
            type.</p>

        <div class="controls">
            <button class="filter-btn active" data-filter="All">All Projects</button>
            <button class="filter-btn" data-filter="Construction">Construction</button>
            <button class="filter-btn" data-filter="Installation">Installation</button>
            <button class="filter-btn" data-filter="Maintenance">Maintenance</button>
            <button class="filter-btn" data-filter="Consulting">Consulting</button>
        </div>

        <section id="projects-container" class="projects-grid">
            <!-- Dynamic content loaded via JS -->
        </section>

        <!-- Dynamic Modal Dialog -->
        <dialog id="project-modal">
            <div class="dialog-content">
                <button id="close-modal" class="close-btn" aria-label="Close modal">×</button>
                <img id="modal-image" src="" alt="" width="475" height="317" loading="lazy" style="width:100%; height:250px; object-fit:cover; margin-bottom:1rem; border-radius:4px;">
                <h2 id="modal-title">Project Title</h2>
                <p id="modal-client" style="font-weight:bold;"></p>
                <p id="modal-type"></p>
                <p id="modal-date"></p>
                <hr>
                <p id="modal-desc"></p>
            </div>
        </dialog>
    </main>

    <footer>
        <p>&copy; <span id="current-year">2026</span> REMIS. All rights reserved.</p>
        <p>Last Modification: <span id="last-modified"></span></p>
        <p><a href="attributions.html">Resource Attributions</a></p>
    </footer>
</body>

</html>
