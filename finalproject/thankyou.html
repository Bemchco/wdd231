<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - REMIS</title>
    <meta name="description" content="Thank you for contacting REMIS to learn more about our industrial solutions.">
    <meta name="author" content="Brandon">

    <meta property="og:title" content="Thank You from REMIS Industrial Solutions">
    <meta property="og:description" content="Thank you for getting in touch with REMIS. We will respond to your industrial inquiry shortly.">
    <meta property="og:image" content="https://bemchco.github.io/wdd231/finalproject/images/logo-remis-v1.webp">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://bemchco.github.io/wdd231/finalproject/thankyou.html">

    <link rel="icon" href="images/logo-remis-v6-isotipo.webp" type="image/webp">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles/normalize.css">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/main-larger.css">

    <script type="module">
        import { setupNavigation } from './scripts/main.mjs';
        document.addEventListener('DOMContentLoaded', () => {
            setupNavigation();

            const params = new URLSearchParams(window.location.search);
            const dataDisplay = document.getElementById('submitted-data');

            if (params.has('firstname')) {
                let html = '<ul>';
                for (const [key, value] of params.entries()) {
                    html += `<li><strong>${key}:</strong> ${value}</li>`;
                }
                html += '</ul>';
                dataDisplay.innerHTML = html;
            } else {
                dataDisplay.innerHTML = '<p>No data submitted.</p>';
            }
        });
    </script>
</head>

<body>
    <header>
        <div class="logo-container">
            <img src="images/logo-remis-v1.webp" alt="REMIS Logo" class="logo-img">
        </div>
        <button id="menuButton" aria-label="Toggle Navigation">☰</button>
        <nav id="navMenu">
            <a href="index.html">Home</a>
            <a href="projects.html">Gallery</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <main>
        <div
            style="background:var(--white); padding:2rem; border-radius:8px; text-align:left; max-width:600px; margin: 0 auto; box-shadow:0 4px 6px rgba(0,0,0,0.1);">
            <h1 style="color:var(--secondary-color);">Thank You!</h1>
            <p>Your request has been successfully submitted. We review all inquiries carefully and will get back to you
                shortly.</p>
            <p>Here is the information you provided:</p>
            <div id="submitted-data" style="background:var(--light-bg); padding:1rem; border-radius:4px;"></div>

            <a href="index.html" class="btn" style="margin-top:2rem;">Return Home</a>
        </div>
    </main>

    <footer>
        <p>&copy; <span id="year">2026</span> REMIS. All rights reserved.</p>
        <p><a href="attributions.html">Resource Attributions</a></p>
    </footer>
    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>

</html>
